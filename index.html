<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#f4f9ff,#d9ecff);
font-family: Arial, Helvetica, sans-serif;
}

.container{
max-width:800px;
background:white;
padding:40px;
margin-top:50px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

fieldset{
border:1px solid #ccc;
padding:15px;
border-radius:8px;
}

legend{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Job Application Form</h1>

<div id="successMessage" class="alert alert-success d-none">
Your application has been submitted successfully!
</div>

<form id="jobForm">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" name="fullName" placeholder="Enter your full name" required>
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" class="form-control" name="email" placeholder="Enter your email" required>
</div>

<div class="col-md-6">
<label class="form-label">Telephone Number</label>
<input type="tel" class="form-control" name="phone" placeholder="Enter phone number" required>
</div>

<div class="col-md-6">
<label class="form-label">Physical Address</label>
<input type="text" class="form-control" name="address" placeholder="Enter address" required>
</div>

</div>

<br>

<fieldset class="mb-4">
<legend>Employment Type</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment_type" value="part_time_contract" required>
<label class="form-check-label">Part-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment_type" value="part_time_permanent">
<label class="form-check-label">Part-time permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment_type" value="full_time_contract">
<label class="form-check-label">Full-time contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment_type" value="full_time_permanent">
<label class="form-check-label">Full-time permanent</label>
</div>

</fieldset>

<fieldset class="mb-4">
<legend>Position</legend>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="position[]" value="Account Executive">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="position[]" value="Business Development Manager">
<label class="form-check-label">Business Development Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="position[]" value="Inside Sales Associate">
<label class="form-check-label">Inside Sales Associate</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="position[]" value="Sales Manager">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="position[]" value="VP Sales">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>

<fieldset class="mb-4">
<legend>Willing to Relocate</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation" value="yes" required>
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocation" value="no">
<label class="form-check-label">No</label>
</div>

</fieldset>

<div class="mb-3">
<label class="form-label">Why are you suitable for the role?</label>
<textarea class="form-control" rows="4" name="description" required></textarea>
</div>

<div class="d-flex gap-3">
<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>

</form>

</div>

<script>

document.getElementById("jobForm").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("successMessage").classList.remove("d-none");

this.reset();

});

</script>

</body>
</html>
